<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushruta Admin | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
        <div class="text-center mb-6">
            <i class="fa-solid fa-lock text-blue-500 text-4xl mb-2"></i>
            <h2 class="text-2xl font-bold">Admin Login</h2>
        </div>
        <input type="password" id="adminPass" placeholder="Enter Password" class="w-full p-3 rounded-lg bg-slate-700 border-none mb-4 outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="checkPass()" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-700 transition">Access Panel</button>
        <a href="index.html" class="block text-center mt-4 text-sm text-slate-400">← Back to Website</a>
    </div>

    <div id="admin-content" class="hidden">
        <nav class="bg-slate-800 p-4 border-b border-slate-700 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <a href="index.html" class="text-slate-400 hover:text-white mr-2"><i class="fa-solid fa-arrow-left"></i></a>
                <span class="font-bold text-blue-400 tracking-tight text-lg">Admin Dashboard</span>
            </div>
            <button onclick="logout()" class="text-xs bg-red-900/30 text-red-400 px-3 py-1 rounded border border-red-900">Logout</button>
        </nav>

        <div class="flex bg-slate-800 border-b border-slate-700 overflow-x-auto">
            <button onclick="showTab('verify')" class="px-6 py-3 text-sm font-medium border-b-2 border-blue-500 bg-slate-700/50">Verifications</button>
            <button onclick="showTab('edit')" class="px-6 py-3 text-sm font-medium border-b-2 border-transparent hover:bg-slate-700/30">Edit Data</button>
        </div>

        <div id="tab-verify" class="p-4 max-w-2xl mx-auto">
            <h3 class="text-xl font-bold mb-4">Pending Requests</h3>
            <div id="pending-container" class="grid gap-4 mb-20 text-center py-10">
                <i class="fa-solid fa-spinner animate-spin text-blue-500 text-2xl"></i>
            </div>
        </div>

        <div id="tab-edit" class="hidden p-4 h-[80vh]">
            <h3 class="text-xl font-bold mb-2 text-center">Master Control Sheet</h3>
            <p class="text-xs text-center text-slate-400 mb-4 italic">Change anything here to update the website instantly.</p>
            <iframe src="https://docs.google.com/spreadsheets/d/1Z3MgzGshtzETmP_GOCIAtQvX9rEfy0hdirOjPIgutPk/edit?usp=sharing" class="w-full h-full rounded-xl border border-slate-700 shadow-2xl bg-white"></iframe>
        </div>
    </div>

    <script>
        // STAY LOGGED IN LOGIC
        window.onload = function() {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadPending();
            }
        };

        function checkPass() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "MAMC123") {
                sessionStorage.setItem('isAdmin', 'true'); // Remembers you
                location.reload(); 
            } else {
                alert("Incorrect Password!");
            }
        }

        function logout() {
            sessionStorage.removeItem('isAdmin');
            location.reload();
        }

        function showTab(tab) {
            document.getElementById('tab-verify').classList.add('hidden');
            document.getElementById('tab-edit').classList.add('hidden');
            document.getElementById('tab-' + tab).classList.remove('hidden');
        }

        function loadPending() {
            const SHEET_ID = '1Z3MgzGshtzETmP_GOCIAtQvX9rEfy0hdirOjPIgutPk';
            const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=Directory&range=A2:F100`;

            fetch(URL).then(res => res.text()).then(rep => {
                const data = JSON.parse(rep.substr(47).slice(0, -2));
                const container = document.getElementById('pending-container');
                container.innerHTML = '';
                let count = 0;
                data.table.rows.forEach(row => {
                    const status = row.c[5] ? row.c[5].v : '';
                    if(status.toUpperCase() !== 'APPROVED') {
                        count++;
                        container.innerHTML += `
                            <div class="bg-slate-800 p-5 rounded-xl border-l-4 border-yellow-500 shadow-lg text-left">
                                <h3 class="font-bold text-lg text-white">${row.c[1]?.v || 'New User'}</h3>
                                <p class="text-sm text-slate-400">Room: ${row.c[3]?.v} | Batch: ${row.c[2]?.v}</p>
                                <div class="mt-4 flex gap-2">
                                     <span class="text-[10px] bg-yellow-500/20 text-yellow-500 px-2 py-1 rounded uppercase font-bold tracking-tighter">Needs Approval</span>
                                </div>
                            </div>`;
                    }
                });
                if(count === 0) container.innerHTML = "✅ No pending requests.";
            });
        }
    </script>
</body>
</html>
