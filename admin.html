<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Sushruta</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">

    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-gray-800 p-8 rounded-xl shadow-2xl">
        <h2 class="text-2xl font-bold mb-4 text-blue-400 text-center">Admin Login</h2>
        <input type="password" id="adminPass" placeholder="Enter Password" class="w-full p-3 rounded bg-gray-700 mb-4 outline-none border border-gray-600 focus:border-blue-500">
        <button onclick="checkPass()" class="w-full bg-blue-600 py-3 rounded font-bold hover:bg-blue-700 transition">Access Panel</button>
    </div>

    <div id="admin-content" class="hidden max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400">Pending Verifications</h1>
            <button onclick="location.reload()" class="text-xs bg-gray-700 px-3 py-1 rounded">Refresh</button>
        </div>
        
        <p class="mb-6 text-gray-400 bg-gray-800 p-4 rounded-lg border-l-4 border-blue-500">
            To approve: Open the Google Sheet and type <span class="text-green-400 font-bold uppercase">Approved</span> in Column F (Status).
        </p>
        
        <div id="pending-container" class="grid gap-4 mb-20">
            <p class="text-blue-400">Checking for requests...</p>
        </div>

        <a href="https://docs.google.com/spreadsheets/d/1Z3MgzGshtzETmP_GOCIAtQvX9rEfy0hdirOjPIgutPk/edit" target="_blank" class="fixed bottom-6 right-6 bg-green-600 hover:bg-green-700 px-6 py-4 rounded-full shadow-2xl font-bold flex items-center gap-2">
            <span>Open Sheet</span>
        </a>
    </div>

    <script>
        function checkPass() {
            const pass = document.getElementById('adminPass').value;
            // Password is MAMC123
            if(pass === "MAMC123") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadPending();
            } else {
                alert("Incorrect Password!");
            }
        }

                function loadPending() {
            const SHEET_ID = '1Z3MgzGshtzETmP_GOCIAtQvX9rEfy0hdirOjPIgutPk';
            
            // We added &sheet=Directory to tell Google exactly where to look
            const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=Directory&range=A2:F100`;

            fetch(URL)
            .then(res => res.text())
            .then(rep => {
                // This removes the "google.visualization..." junk and gives us clean data
                const data = JSON.parse(rep.substr(47).slice(0, -2));
                const container = document.getElementById('pending-container');
                container.innerHTML = '';
                
                let count = 0;
                data.table.rows.forEach(row => {
                    // Check Column F (index 5) for Status
                    const status = row.c[5] ? row.c[5].v : '';
                    
                    if(status !== 'Approved') {
                        count++;
                        container.innerHTML += `
                            <div class="bg-gray-800 p-5 rounded-lg border-l-4 border-yellow-500 shadow-lg mb-4">
                                <h3 class="font-bold text-xl text-white">${row.c[1] ? row.c[1].v : 'No Name'}</h3>
                                <div class="text-sm text-gray-400 mt-2">
                                    <p>Batch: ${row.c[2] ? row.c[2].v : 'N/A'}</p>
                                    <p>Room: ${row.c[3] ? row.c[3].v : 'N/A'}</p>
                                    <p>Phone: ${row.c[4] ? row.c[4].v : 'N/A'}</p>
                                </div>
                                <div class="mt-4 text-[10px] text-yellow-500 font-bold uppercase tracking-widest text-right">Pending Approval</div>
                            </div>`;
                    }
                });

                if(count === 0) {
                    container.innerHTML = '<div class="text-center py-10 text-gray-500">✅ No pending requests!</div>';
                }
            });
        }
