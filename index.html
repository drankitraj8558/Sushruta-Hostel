<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushruta Hostel | MAMC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="flex justify-between items-center p-5 bg-white shadow-sm sticky top-0 z-50">
        <div>
            <h1 class="font-bold text-blue-700 text-lg leading-tight">Sushruta Hostel</h1>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest">MAMC, Delhi</p>
        </div>
        <a href="admin.html" class="bg-blue-600 text-white px-4 py-2 rounded-lg shadow-md font-bold text-[10px] hover:bg-blue-700 transition">ADMIN DASHBOARD</a>
    </nav>

    <div id="home-view" class="transition-all duration-300">
        <header class="py-12 px-6 text-center bg-gradient-to-b from-white to-slate-50">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-3 leading-tight">Welcome to <span class="text-blue-600">Sushruta</span></h1>
            <p class="text-slate-500 text-sm mb-8 max-w-xs mx-auto">Official Resident Portal for Maulana Azad Medical College residents.</p>
            <button onclick="showView('directory')" class="bg-blue-600 text-white px-8 py-4 rounded-2xl shadow-xl shadow-blue-200 font-bold flex items-center gap-3 mx-auto hover:scale-105 transition transform">
                <i class="fa-solid fa-address-book"></i> Resident Directory
            </button>
        </header>

        <section class="p-6 max-w-2xl mx-auto">
            <div class="flex items-center gap-3 mb-6">
                <div class="h-8 w-1.5 bg-blue-600 rounded-full"></div>
                <h2 class="text-2xl font-bold tracking-tight text-slate-800">Notice Board</h2>
            </div>
            <div id="notice-container" class="grid gap-4">
                <div class="animate-pulse flex flex-col gap-3">
                    <div class="h-20 bg-slate-200 rounded-xl w-full"></div>
                </div>
            </div>
        </section>
    </div>

    <div id="directory-view" class="hidden min-h-screen bg-slate-50 p-6 animate-fadeIn">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="showView('home')" class="bg-white p-3 rounded-full shadow-sm text-blue-600"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="text-2xl font-extrabold text-slate-900">Resident Directory</h2>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm mb-8 border border-slate-100">
            <div class="relative mb-4">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-slate-300"></i>
                <input type="text" id="nameSearch" oninput="filterDirectory()" placeholder="Search by name..." class="w-full pl-12 pr-4 py-4 rounded-xl bg-slate-50 border-none focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium">
            </div>
            <div class="flex gap-3">
                <input type="text" id="batchSearch" oninput="filterDirectory()" placeholder="Batch (e.g. 2021)" class="w-1/2 p-4 rounded-xl bg-slate-50 border-none text-sm outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                <input type="text" id="roomSearch" oninput="filterDirectory()" placeholder="Room No." class="w-1/2 p-4 rounded-xl bg-slate-50 border-none text-sm outline-none focus:ring-2 focus:ring-blue-500 font-medium">
            </div>
        </div>

        <div id="directory-container" class="grid gap-4">
            </div>
    </div>

        <script>
    const SHEET_ID = "1Z3MgzGshtzETmP_GOCIAtQvX9rEfy0hdirOjPIgutPk";

    function showView(view) {
        document.getElementById('home-view').classList.toggle('hidden', view !== 'home');
        document.getElementById('directory-view').classList.toggle('hidden', view !== 'directory');
    }

    // 1. FETCH NOTICES (Forced to tab name 'Notices')
    const noticeURL = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?sheet=Notices";
    fetch(noticeURL)
    .then(res => res.text()).then(rep => {
        const data = JSON.parse(rep.substr(47).slice(0, -2));
        const container = document.getElementById('notice-container');
        container.innerHTML = '';
        data.table.rows.forEach(row => {
            if(row.c[1] && row.c[1].v) {
                container.innerHTML += `
                    <div class="p-5 bg-white rounded-2xl shadow-sm border border-slate-100 mb-3">
                        <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded mb-2 inline-block uppercase">Update</span>
                        <h3 class="font-bold text-slate-800 text-lg">${row.c[1].v}</h3>
                        <p class="text-sm text-slate-500 mt-2">${row.c[2]?.v || ''}</p>
                    </div>`;
            }
        });
    });

    // 2. FETCH DIRECTORY (Forced to tab name 'Directory')
    let allStudents = [];
    const directoryURL = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?sheet=Directory";
    
    fetch(directoryURL)
    .then(res => res.text()).then(rep => {
        const data = JSON.parse(rep.substr(47).slice(0, -2));
        
        // CHECK: Is this data actually the Directory? (Column B should be a Name, not a Date)
        // If Google fails, it sends the first tab. This "if" prevents the mixing.
        if (data.table.cols[1].label === "Name" || data.table.rows[0].c[1].v !== "Renovation") {
             allStudents = data.table.rows;
             filterDirectory(); 
        } else {
            console.error("Tab Mismatch: Still reading Notices instead of Directory.");
        }
    });

    function filterDirectory() {
        const nQuery = document.getElementById('nameSearch').value.toLowerCase();
        const bQuery = document.getElementById('batchSearch').value.toLowerCase();
        const rQuery = document.getElementById('roomSearch').value.toLowerCase();
        const container = document.getElementById('directory-container');
        container.innerHTML = '';
        
        allStudents.forEach(row => {
            const name = String(row.c[1]?.v || '').toLowerCase();
            const batch = String(row.c[2]?.v || '').toLowerCase();
            const room = String(row.c[3]?.v || '').toLowerCase();
            const status = String(row.c[5]?.v || '').toUpperCase();

            if(status === 'APPROVED' && name.includes(nQuery) && batch.includes(bQuery) && room.includes(rQuery)) {
                container.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center mb-3">
                        <div>
                            <h3 class="font-bold text-slate-800 text-lg capitalize">${row.c[1]?.v}</h3>
                            <p class="text-[11px] text-slate-400 font-bold uppercase">BATCH: ${row.c[2]?.v} | ROOM: ${row.c[3]?.v}</p>
                        </div>
                        <a href="tel:${row.c[4]?.v}" class="bg-blue-600 text-white h-10 w-10 rounded-full flex items-center justify-center shadow-lg"><i class="fa-solid fa-phone text-sm"></i></a>
                    </div>`;
            }
        });
    }
</script>


</body>
</html>
