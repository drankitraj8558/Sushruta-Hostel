<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushruta Hostel | MAMC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-gray-800">

    <nav class="flex justify-between items-center p-4 bg-white shadow-sm sticky top-0 z-50">
        <div class="font-bold text-blue-700 text-sm leading-tight">Sushruta Hostel <br><span class="text-[10px] text-gray-400 font-normal">MAMC, Delhi</span></div>
        <a href="admin.html" class="bg-blue-600 text-white px-3 py-2 rounded shadow font-bold text-[10px]">ADMIN DASHBOARD</a>
    </nav>

    <div id="home-view">
        <header class="p-8 text-center bg-white border-b">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">Welcome to Sushruta</h1>
            <p class="text-gray-500 text-sm mb-6">Official Resident Portal</p>
            <div class="flex justify-center gap-3">
                <button onclick="showView('directory')" class="bg-blue-600 text-white px-5 py-3 rounded-xl shadow-lg font-bold flex items-center gap-2">
                    <i class="fa-solid fa-address-book"></i> Resident Directory
                </button>
            </div>
        </header>

        <section class="p-6">
            <h2 class="text-xl font-bold mb-4 border-b-2 border-blue-600 inline-block">Notice Board</h2>
            <div id="notice-container" class="grid gap-4">
                <p class="text-center py-10 text-slate-400 italic">Loading latest notices...</p>
            </div>
        </section>
    </div>

    <div id="directory-view" class="hidden min-h-screen bg-slate-100 p-4">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="showView('home')" class="text-blue-600 text-xl"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="text-2xl font-bold text-slate-800">Resident Directory</h2>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 space-y-3">
            <input type="text" id="nameSearch" onkeyup="filterDirectory()" placeholder="Search by Name..." class="w-full p-3 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            <div class="flex gap-2">
                <input type="text" id="batchSearch" onkeyup="filterDirectory()" placeholder="Filter by Batch (e.g. 2021)" class="w-1/2 p-3 rounded-lg border border-slate-200 text-sm outline-none">
                <input type="text" id="roomSearch" onkeyup="filterDirectory()" placeholder="Filter by Room" class="w-1/2 p-3 rounded-lg border border-slate-200 text-sm outline-none">
            </div>
        </div>

        <div id="directory-container" class="grid gap-4">
            </div>
    </div>

    <script>
        const SHEET_ID = '1Z3MgzGshtzETmP_GOCIAtQvX9rEfy0hdirOjPIgutPk';

        // Navigation Switcher
        function showView(view) {
            document.getElementById('home-view').style.display = view === 'home' ? 'block' : 'none';
            document.getElementById('directory-view').style.display = view === 'directory' ? 'block' : 'none';
            window.scrollTo(0,0);
        }

        // 1. Fetch Notices
        fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=Notices&range=A2:C10`)
        .then(res => res.text()).then(rep => {
            const data = JSON.parse(rep.substr(47).slice(0, -2));
            const container = document.getElementById('notice-container');
            container.innerHTML = '';
            data.table.rows.forEach(row => {
                container.innerHTML += `
                    <div class="p-4 bg-white rounded-xl shadow-sm border-l-4 border-blue-500">
                        <small class="text-blue-500 font-bold uppercase text-[10px]">${row.c[0]?.f || ''}</small>
                        <h3 class="font-bold text-slate-800">${row.c[1]?.v || ''}</h3>
                        <p class="text-xs text-slate-500 mt-1">${row.c[2]?.v || ''}</p>
                    </div>`;
            });
        });

        // 2. Fetch Directory
        let allStudents = [];
        fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=Directory&range=A2:F100`)
        .then(res => res.text()).then(rep => {
            const data = JSON.parse(rep.substr(47).slice(0, -2));
            allStudents = data.table.rows;
            filterDirectory(); // Initial load
        });

        function filterDirectory() {
            const nQuery = document.getElementById('nameSearch').value.toLowerCase();
            const bQuery = document.getElementById('batchSearch').value.toLowerCase();
            const rQuery = document.getElementById('roomSearch').value.toLowerCase();
            const container = document.getElementById('directory-container');
            
            container.innerHTML = '';
            
            allStudents.forEach(row => {
                const name = String(row.c[1]?.v || '').toLowerCase();
                const batch = String(row.c[2]?.v || '').toLowerCase();
                const room = String(row.c[3]?.v || '').toLowerCase();
                const phone = row.c[4]?.v || '';
                const status = String(row.c[5]?.v || '').toUpperCase();

                if(status === 'APPROVED' && name.includes(nQuery) && batch.includes(bQuery) && room.includes(rQuery)) {
                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="font-bold text-slate-800 capitalize">${row.c[1]?.v}</h3>
                                    <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">Batch: ${row.c[2]?.v} | Room: ${row.c[3]?.v}</p>
                                </div>
                                <a href="tel:${phone}" class="bg-blue-50 text-blue-600 p-3 rounded-full shadow-inner"><i class="fa-solid fa-phone"></i></a>
                            </div>
                        </div>`;
                }
            });
            if(container.innerHTML === '') container.innerHTML = '<p class="text-center text-slate-400 py-10">No students found.</p>';
        }
    </script>
</body>
</html>
    </script>
